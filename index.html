body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;background:#fff;color:#15181e;}
.app{display:flex;height:100vh;overflow:hidden;}
.rail{width:76px;flex-shrink:0;background:#15161d;display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:6px;}
.rail .r{width:58px;border-radius:12px;background:#23252f;color:#c4c7d0;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;cursor:pointer;font-size:10px;font-weight:700;text-align:center;transition:.15s;}
.rail .r .ic{font-size:19px;}.rail .r:hover{background:#3a3d4d;}.rail .r.on{background:#4f6df5;color:#fff;}
.chans{width:240px;flex-shrink:0;background:#1b1d27;color:#c4c7d0;display:flex;flex-direction:column;}
.chans .hd{padding:13px 15px;border-bottom:1px solid #2a2c39;}
.chans .hd .nm{font-size:15px;font-weight:800;color:#fff;}
.chans .hd .sub{font-size:11px;color:#8a8f9e;margin-top:2px;}
.chans .hd select{width:100%;margin-top:8px;background:#0e0f15;color:#e6e8ee;border:1px solid #2a2c39;border-radius:7px;padding:6px 8px;font-size:12px;}
.updbtn{width:100%;margin-top:7px;background:#e0518a;color:#fff;border:0;border-radius:7px;padding:6px;font-size:11.5px;font-weight:800;cursor:pointer;}
.chans .scroll{flex:1;overflow-y:auto;padding:8px 0 16px;}
.allch{margin:4px 8px;padding:8px 10px;border-radius:7px;font-size:13px;font-weight:700;color:#e6e8ee;background:#23252f;cursor:pointer;}.allch.on{background:#4f6df5;}
.ch{display:flex;align-items:center;gap:9px;margin:1px 8px;padding:6px 8px;border-radius:7px;font-size:13px;color:#b6bac6;cursor:pointer;}
.ch:hover{background:#23252f;color:#fff;}.ch.on{background:#34384a;color:#fff;}
.ch .ico{width:28px;height:28px;border-radius:7px;background:#2a2c39 center/cover;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#9aa0b0;overflow:hidden;}
.ch .ico img{width:100%;height:100%;object-fit:cover;}
.ch .nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ch .cnt{font-size:10px;background:#2a2c39;color:#9aa0b0;border-radius:9px;padding:1px 6px;}.ch.on .cnt{background:#4f6df5;color:#fff;}
.main{flex:1;min-width:0;background:#f5f6f8;overflow-y:auto;}
.mh{background:#fff;border-bottom:1px solid #e5e7eb;padding:13px 22px;position:sticky;top:0;z-index:5;}
.mh h1{font-size:17px;font-weight:800;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.mh .tag{font-size:11px;font-weight:700;color:#fff;padding:2px 8px;border-radius:999px;}
.mh .meta{font-size:12px;color:#6b7280;margin-top:2px;}
.bar{display:flex;gap:14px;align-items:center;margin-top:10px;flex-wrap:wrap;}
.seg{display:flex;background:#eef0f3;border-radius:8px;padding:2px;}
.seg button{border:0;background:transparent;padding:5px 11px;font-size:12px;font-weight:700;color:#6b7280;border-radius:6px;cursor:pointer;}
.seg button.on{background:#fff;color:#15181e;box-shadow:0 1px 3px rgba(0,0,0,.12);}
.bar .lbl{font-size:11px;color:#9ca3af;font-weight:700;}
.body{padding:16px 22px 50px;}
.note{background:#eef2ff;border:1px solid #dbe3ff;color:#3a4a8c;font-size:12px;padding:9px 13px;border-radius:8px;margin-bottom:14px;}
.feed{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;}
.it{background:#fff;border:1px solid #e5e7eb;border-radius:11px;overflow:hidden;cursor:pointer;transition:.15s;display:flex;flex-direction:column;}
.it:hover{box-shadow:0 6px 16px rgba(28,35,66,.13);transform:translateY(-2px);}
.th{position:relative;height:150px;background:#0c0d12 center/cover no-repeat;}
.th .pl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:30px;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.7);opacity:.92;}
.th .kd{position:absolute;top:6px;left:6px;font-size:9px;font-weight:800;padding:2px 6px;border-radius:5px;color:#fff;}
.th .imp{position:absolute;bottom:6px;right:6px;background:rgba(79,109,245,.95);color:#fff;font-size:10px;font-weight:800;padding:2px 6px;border-radius:5px;}
.th .run{position:absolute;bottom:6px;left:6px;background:rgba(0,0,0,.62);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px;}
.th .new{position:absolute;top:6px;right:6px;background:#e0518a;color:#fff;font-size:9px;font-weight:800;padding:2px 5px;border-radius:5px;}
.ib{padding:8px 10px;}
.itt{font-size:12px;font-weight:600;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.im{font-size:10.5px;color:#9ca3af;margin-top:4px;}
.empty{color:#9ca3af;font-size:13px;padding:24px 0;}
.modal{display:none;position:fixed;inset:0;background:rgba(10,11,16,.85);z-index:100;align-items:center;justify-content:center;padding:24px;}
.mdbox{background:#fff;border-radius:12px;padding:14px;max-width:540px;width:100%;max-height:92vh;overflow:auto;}
.mdh{display:flex;justify-content:space-between;gap:10px;margin-bottom:10px;}
.mdt{font-size:14px;font-weight:700;}.mdm{font-size:11px;color:#6b7280;}
.mx{border:0;background:#eef0f3;padding:5px 9px;border-radius:8px;cursor:pointer;flex-shrink:0;font-size:12px;}
.modal img,.modal video{display:block;margin:0 auto;max-width:100%;max-height:66vh;border-radius:8px;}
.mnote{margin-top:9px;background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;font-size:12px;padding:8px 11px;border-radius:8px;}
.updd{margin:13px 0 7px;font-weight:800;font-size:13px;border-top:1px solid #eee;padding-top:10px;}
.updd span{color:#9ca3af;font-weight:600;font-size:11px;}
.updg{display:grid;grid-template-columns:repeat(auto-fill,minmax(82px,1fr));gap:7px;}
.updc{cursor:pointer;}.updt{aspect-ratio:1;border-radius:7px;background:#0c0d12 center/cover no-repeat;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;}
.updn{font-size:9px;color:#6b7280;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
@media(max-width:860px){.chans{width:180px}}
@media(max-width:760px){
html,body{height:auto;}
.app{flex-direction:column;height:auto;overflow:visible;}
.rail{flex-direction:row;width:100%;height:auto;overflow-x:auto;gap:8px;padding:8px 10px;}
.rail .r{flex:0 0 auto;flex-direction:row;width:auto;gap:6px;padding:8px 12px;}
.rail .r .ic{font-size:16px;}
.chans{width:100%;height:auto;}
.chans .scroll{flex:none;display:flex;flex-direction:row;flex-wrap:nowrap;overflow-x:auto;gap:6px;padding:8px 10px;}
.chans .ch{flex:0 0 auto;margin:0;white-space:nowrap;}
.main{height:auto;overflow:visible;}
.body{padding:14px 12px 40px;}
.feed{grid-template-columns:repeat(2,1fr);gap:9px;}
}

function buildRail(){var r=document.getElementById('rail');r.innerHTML=Object.keys(GEN).map(function(g){return '<div class="r '+(g===GENRE?'on':'')+'" data-g="'+g+'"><span class="ic">'+GEN[g].ic+'</span>'+g+'</div>';}).join('');
 r.onclick=function(e){var d=e.target.closest('.r');if(!d)return;GENRE=d.dataset.g;GAME=null;buildRail();buildChans();render();};}
function pool(){return ITEMS.filter(function(x){if(x.gen!==GENRE)return false;if(CTRY){if(CTRY==='글로벌(유튜브)'){if(x.src!=='공식')return false;}else{if(x.src==='공식')return false;if(x.ctry!==CTRY)return false;}}if(TYPE&&x.type!==TYPE)return false;return true;});}
function buildChans(){document.getElementById('gnm').textContent=GENRE+' 워치';document.getElementById('gsub').textContent='자사: '+GEN[GENRE].self;
 var d=pool();var gm={};d.forEach(function(x){if(!gm[x.disp])gm[x.disp]={n:0,imp:0,ico:iconFor(x.game)};gm[x.disp].n++;gm[x.disp].imp+=x.imp;});
 var games=Object.keys(gm).map(function(g){return{g:g,n:gm[g].n,imp:gm[g].imp,ico:gm[g].ico};}).sort(function(a,b){return b.imp-a.imp;});
 var h='<div class="allch '+(!GAME?'on':'')+'" data-all="1">📋 전체 ('+d.length+')</div>';
 h+=games.map(function(x){return '<div class="ch '+(GAME===x.g?'on':'')+'" data-g="'+x.g.replace(/"/g,'&quot;')+'"><span class="ico">'+(x.ico?'<img src="'+x.ico+'" onerror="this.parentNode.textContent=\''+x.g[0]+'\'">':x.g[0])+'</span><span class="nm">'+x.g+'</span><span class="cnt">'+x.n+'</span></div>';}).join('');
 var cl=document.getElementById('chlist');cl.innerHTML=h;
 cl.onclick=function(e){if(e.target.closest('.allch')){GAME=null;buildChans();render();return;}var c=e.target.closest('.ch');if(!c)return;GAME=c.dataset.g;buildChans();render();};}
document.getElementById('ctry').onchange=function(e){CTRY=e.target.value;GAME=null;buildChans();render();};
function setType(t){TYPE=t;render();}function setSort(s){SORT=s;render();}
function card(x){var k=KB[x.kind];var off=x.src==='공식';
 var metricR=off?fmtImp(x.views):fmtImp(x.imp);
 var metricL=off?(x.likes?'♥ '+fmtImp(x.likes):''):(x.act?'집행 '+x.act+'일':'');
 return '<div class="it" data-x=\''+encodeURIComponent(JSON.stringify({k:x.kind,vid:x.vid,th:x.th,t:x.title,g:x.disp,d:x.date,src:x.src}))+'\' onclick="openIt(this)">'+
 '<div class="th lazy" data-bg="'+x.th+'">'+
 '<span class="kd" style="background:'+(off?'#ff0000':k.bg)+'">'+(off?'공식 유튜브':k.lb)+'</span>'+
 (metricR?'<span class="imp">'+(off?'▶':'')+metricR+'</span>':'')+
 (metricL?'<span class="run">'+metricL+'</span>':'')+
 (days(x.date)<=3?'<span class="new">NEW</span>':'')+
 ((x.kind==='yt'||x.kind==='vid')?'<span class="pl">▶</span>':'')+
 '</div><div class="ib"><div class="itt">'+x.title+'</div><div class="im">'+(CC[x.ctry]||'')+' '+x.disp+' · '+x.date+'</div></div></div>';}
function openIt(el){var x=JSON.parse(decodeURIComponent(el.dataset.x));var md=document.getElementById('md');
 if(x.k==='yt'){if(x.vid){window.open('https://www.youtube.com/watch?v='+x.vid,'_blank','noopener');return;}}
 var inner;if(x.k==='vid'){inner='<video src="'+x.th.replace(/\.frame\.[\d.]+\.jpg$/,'')+'" controls autoplay playsinline></video>';}
 else if(x.k==='yt'){inner='<img src="'+x.th+'"><div class="mnote">유튜브 영상 소재</div>';}
 else{inner='<img src="'+x.th+'"><div class="mnote">📷 이미지 광고</div>';}
 md.innerHTML='<div class="mdh"><div><div class="mdt">'+x.g+'</div><div class="mdm">'+x.t+' · '+x.d+' · '+x.src+'</div></div><button class="mx" onclick="closeM()">✕ 닫기</button></div>'+inner;
 document.getElementById('modal').style.display='flex';}
function closeM(){document.getElementById('modal').style.display='none';document.getElementById('md').innerHTML='';}
function render(){var d=pool();if(GAME)d=d.filter(function(x){return x.disp===GAME;});
 d.sort(function(a,b){return SORT==='act'?(b.act-a.act):SORT==='date'?b.date.localeCompare(a.date):(b.imp-a.imp);});
 var yc=d.filter(function(x){return x.src==='공식';}).length,ac=d.length-yc;
 document.getElementById('mh').innerHTML='<h1>'+(GAME||GENRE+' 전체')+' <span class="tag" style="background:'+GEN[GENRE].c+'">'+GENRE+'</span></h1>'+
 '<div class="meta">공식 유튜브 '+yc+' · AppMagic 광고 '+ac+' · '+(new Set(d.map(function(x){return x.disp;}))).size+'개 게임</div>'+
 '<div class="bar"><span class="lbl">유형</span><div class="seg"><button class="'+(TYPE===''?'on':'')+'" onclick="setType(\'\')">전체</button><button class="'+(TYPE==='영상'?'on':'')+'" onclick="setType(\'영상\')">▶ 영상</button><button class="'+(TYPE==='이미지'?'on':'')+'" onclick="setType(\'이미지\')">📷 이미지</button></div>'+
 '<span class="lbl">정렬</span><div class="seg"><button class="'+(SORT==='imp'?'on':'')+'" onclick="setSort(\'imp\')">노출/조회수</button><button class="'+(SORT==='act'?'on':'')+'" onclick="setSort(\'act\')">집행기간</button><button class="'+(SORT==='date'?'on':'')+'" onclick="setSort(\'date\')">최신</button></div></div>';
 var c=document.getElementById('content');
 c.innerHTML=d.length?'<div class="feed">'+d.map(card).join('')+'</div>':'<div class="empty">해당 조건 소재가 없습니다.</div>';lazyBg();}
var _io;
function lzset(d){var u=d.dataset.bg;var im=new Image();im.onload=function(){d.style.backgroundImage="url('"+u+"')";d.classList.remove('lazy');};im.onerror=function(){var it=d.closest('.it');if(it)it.remove();};im.src=u;}
function lazyBg(){if(_io)_io.disconnect();if(!('IntersectionObserver'in window)){document.querySelectorAll('.th.lazy[data-bg]').forEach(lzset);return;}
 _io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){lzset(e.target);_io.unobserve(e.target);}});},{rootMargin:'400px'});
 document.querySelectorAll('.th.lazy[data-bg]').forEach(function(d){_io.observe(d);});}
var _log=[],_calM=null,_curDay='';
function updBy(){var by={};ITEMS.forEach(function(x){(by[x.added]=by[x.added]||[]).push(x);});return by;}
function openUpd(){var dates=Object.keys(updBy()).sort();if(!_calM){var mx=dates.slice(-1)[0]||'2026-06-28';_calM=new Date(+mx.slice(0,4),+mx.slice(5,7)-1,1);}renderCal();}
function calMove(n){_calM=new Date(_calM.getFullYear(),_calM.getMonth()+n,1);renderCal();}
function renderCal(){var by=updBy();var y=_calM.getFullYear(),m=_calM.getMonth();
 var start=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate();
 var mn=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'][m];
 var h='<div class="mdh"><div><div class="mdt">🗓️ 업데이트 내역</div><div class="mdm">새 소재가 잡힌 날만 표시 · 누적 '+Object.keys(by).length+'일 '+ITEMS.length+'건</div></div><button class="mx" onclick="closeM()">✕</button></div>';
 h+='<div style="display:flex;align-items:center;justify-content:center;gap:14px;margin:4px 0 12px"><button class="mx" onclick="calMove(-1)">‹</button><div style="font-weight:800;font-size:15px;min-width:120px;text-align:center">'+y+'년 '+mn+'</div><button class="mx" onclick="calMove(1)">›</button></div>';
 h+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:5px;text-align:center">';
 ['일','월','화','수','목','금','토'].forEach(function(w,i){h+='<div style="font-size:11px;font-weight:700;color:'+(i===0?'#e0518a':i===6?'#4f6df5':'#9ca3af')+';padding-bottom:2px">'+w+'</div>';});
 for(var i=0;i<start;i++)h+='<div></div>';
 for(var d=1;d<=dim;d++){var ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');var it=by[ds];
  if(it)h+='<div onclick="showDay(\''+ds+'\')" style="cursor:pointer;border-radius:9px;padding:6px 2px;background:#eef2ff;border:1px solid #c7d2fe"><div style="font-size:13px;font-weight:800;color:#3730a3">'+d+'</div><div style="font-size:9px;font-weight:800;color:#fff;background:#4f6df5;border-radius:8px;display:inline-block;padding:1px 6px;margin-top:2px">'+it.length+'</div></div>';
  else h+='<div style="border-radius:9px;padding:6px 2px;color:#ccd1da;font-size:13px">'+d+'</div>';}
 h+='</div><div style="font-size:11px;color:#9ca3af;margin-top:12px;text-align:center">파란 날짜를 클릭하면 그날 추가된 소재가 보입니다</div>';
 document.getElementById('md').innerHTML=h;document.getElementById('modal').style.display='flex';}
function showDay(dt){_curDay=dt;var items=(updBy()[dt]||[]).slice().sort(function(a,b){return (b.imp||b.views||0)-(a.imp||a.views||0);});_log=[];
 var h='<div class="mdh"><div><div class="mdt">📅 '+dt+'</div><div class="mdm">이 날 추가된 소재 '+items.length+'건</div></div><button class="mx" onclick="renderCal()">← 달력</button></div><div class="updg">';
 h+=items.map(function(x){var i=_log.push(x)-1;return '<div class="updc" onclick="playLog('+i+')" title="'+x.disp+'"><div class="updt" style="background-image:url(\''+x.th+'\')">'+((x.kind==='yt'||x.kind==='vid')?'▶':'📷')+'</div><div class="updn">'+x.disp+'</div></div>';}).join('');
 h+='</div>';document.getElementById('md').innerHTML=h;}
function playLog(i){var x=_log[i];if(x.kind==='yt'&&x.vid){window.open('https://www.youtube.com/watch?v='+x.vid,'_blank','noopener');return;}
 var inner=x.kind==='vid'?'<video src="'+x.th.replace(/\.frame\.[\d.]+\.jpg$/,'')+'" controls autoplay playsinline></video>':'<img src="'+x.th+'"><div class="mnote">'+(x.kind==='img'?'📷 이미지 광고':'유튜브 영상 소재')+'</div>';
 document.getElementById('md').innerHTML='<div class="mdh"><div><div class="mdt">'+x.disp+'</div><div class="mdm">'+x.title+' · '+x.date+'</div></div><button class="mx" onclick="showDay(\''+_curDay+'\')">← 목록</button></div>'+inner;}
document.getElementById('updBtn').onclick=openUpd;
buildRail();buildChans();render();
</script>
</body>
</html>
