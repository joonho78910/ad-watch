.app{display:flex;height:100vh;overflow:hidden;}

.chans{width:240px;flex-shrink:0;background:#1b1d27;color:#c4c7d0;display:flex;flex-direction:column;}

.chans .hd .sub{font-size:11px;color:#8a8f9e;margin-top:2px;}
.chans .hd select{width:100%;margin-top:8px;background:#0e0f15;color:#e6e8ee;border:1px solid #2a2c39;border-radius:7px;padding:6px 8px;font-size:12px;}
.updbtn{width:100%;margin-top:7px;background:#e0518a;color:#fff;border:0;border-radius:7px;padding:6px;font-size:11.5px;font-weight:800;cursor:pointer;}
.chans .scroll{flex:1;overflow-y:auto;padding:8px 0 16px;}
.allch{margin:4px 8px;padding:8px 10px;border-radius:7px;font-size:13px;font-weight:700;color:#e6e8ee;background:#23252f;cursor:pointer;}.allch.on{background:#4f6df5;}
.ch{display:flex;align-items:center;gap:9px;margin:1px 8px;padding:6px 8px;border-radius:7px;font-size:13px;color:#b6bac6;cursor:pointer;}
.ch:hover{background:#23252f;color:#fff;}.ch.on{background:#34384a;color:#fff;}
.ch .ico{width:28px;height:28px;border-radius:7px;background:#2a2c39 center/cover;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#9aa0b0;overflow:hidden;}
.ch .ico img{width:100%;height:100%;object-fit:cover;}
.ch .nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ch .cnt{font-size:10px;background:#2a2c39;color:#9aa0b0;border-radius:9px;padding:1px 6px;}.ch.on .cnt{background:#4f6df5;color:#fff;}
.main{flex:1;min-width:0;background:#f5f6f8;overflow-y:auto;}
.mh{background:#fff;border-bottom:1px solid #e5e7eb;padding:13px 22px;position:sticky;top:0;z-index:5;}
.mh h1{font-size:17px;font-weight:800;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.mh .tag{font-size:11px;font-weight:700;color:#fff;padding:2px 8px;border-radius:999px;}
.mh .meta{font-size:12px;color:#6b7280;margin-top:2px;}
.bar{display:flex;gap:14px;align-items:center;margin-top:10px;flex-wrap:wrap;}
.seg{display:flex;background:#eef0f3;border-radius:8px;padding:2px;}

.seg button.on{background:#fff;color:#15181e;box-shadow:0 1px 3px rgba(0,0,0,.12);}
.bar .lbl{font-size:11px;color:#9ca3af;font-weight:700;}
.body{padding:16px 22px 50px;}
.note{background:#eef2ff;border:1px solid #dbe3ff;color:#3a4a8c;font-size:12px;padding:9px 13px;border-radius:8px;margin-bottom:14px;}
.feed{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;}
.it{background:#fff;border:1px solid #e5e7eb;border-radius:11px;overflow:hidden;cursor:pointer;transition:.15s;display:flex;flex-direction:column;}

.th{position:relative;height:150px;background:#0c0d12 center/cover no-repeat;}
.th .pl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:30px;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.7);opacity:.92;}
.th .kd{position:absolute;top:6px;left:6px;font-size:9px;font-weight:800;padding:2px 6px;border-radius:5px;color:#fff;}
.th .imp{position:absolute;bottom:6px;right:6px;background:rgba(79,109,245,.95);color:#fff;font-size:10px;font-weight:800;padding:2px 6px;border-radius:5px;}

.th .new{position:absolute;top:6px;right:6px;background:#e0518a;color:#fff;font-size:9px;font-weight:800;padding:2px 5px;border-radius:5px;}
.ib{padding:8px 10px;}
.itt{font-size:12px;font-weight:600;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.im{font-size:10.5px;color:#9ca3af;margin-top:4px;}
.empty{color:#9ca3af;font-size:13px;padding:24px 0;}
.modal{display:none;position:fixed;inset:0;background:rgba(10,11,16,.85);z-index:100;align-items:center;justify-content:center;padding:24px;}
.mdbox{background:#fff;border-radius:12px;padding:14px;max-width:540px;width:100%;max-height:92vh;overflow:auto;}
.mdh{display:flex;justify-content:space-between;gap:10px;margin-bottom:10px;}
.mdt{font-size:14px;font-weight:700;}.mdm{font-size:11px;color:#6b7280;}
.mx{border:0;background:#eef0f3;padding:5px 9px;border-radius:8px;cursor:pointer;flex-shrink:0;font-size:12px;}
.modal img,.modal video{display:block;margin:0 auto;max-width:100%;max-height:66vh;border-radius:8px;}
.mnote{margin-top:9px;background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;font-size:12px;padding:8px 11px;border-radius:8px;}
.updd{margin:13px 0 7px;font-weight:800;font-size:13px;border-top:1px solid #eee;padding-top:10px;}
.updd span{color:#9ca3af;font-weight:600;font-size:11px;}
.updg{display:grid;grid-template-columns:repeat(auto-fill,minmax(82px,1fr));gap:7px;}

 c.innerHTML=d.length?'<div class="feed">'+d.map(card).join('')+'</div>':'<div class="empty">해당 조건 소재가 없습니다.</div>';}
var _log=[];
function openUpd(){var by={};ITEMS.forEach(function(x){(by[x.added]=by[x.added]||[]).push(x);});var dates=Object.keys(by).sort().reverse();_log=[];
 var h='<div class="mdh"><div><div class="mdt">🆕 업데이트 내역</div><div class="mdm">매일 새 소재가 날짜별로 쌓입니다 · 최종 '+(dates[0]||'-')+'</div></div><button class="mx" onclick="closeM()">✕</button></div>';
 dates.forEach(function(dt){var items=by[dt];h+='<div class="updd">📅 '+dt+' <span>('+items.length+'건)</span></div><div class="updg">';
  h+=items.slice(0,80).map(function(x){var i=_log.push(x)-1;return '<div class="updc" onclick="playLog('+i+')" title="'+x.disp+'"><div class="updt" style="background-image:url(\''+x.th+'\')">'+((x.kind==='yt'||x.kind==='vid')?'▶':'📷')+'</div><div class="updn">'+x.disp+'</div></div>';}).join('');h+='</div>';});
 document.getElementById('md').innerHTML=h;document.getElementById('modal').style.display='flex';}
function playLog(i){var x=_log[i];if(x.kind==='yt'&&x.vid){window.open('https://www.youtube.com/watch?v='+x.vid,'_blank','noopener');return;}
 var inner=x.kind==='vid'?'<video src="'+x.th.replace(/\.frame\.[\d.]+\.jpg$/,'')+'" controls autoplay playsinline></video>':'<img src="'+x.th+'"><div class="mnote">'+(x.kind==='img'?'📷 이미지 광고':'유튜브 영상 소재')+'</div>';
 document.getElementById('md').innerHTML='<div class="mdh"><div><div class="mdt">'+x.disp+'</div><div class="mdm">'+x.title+' · '+x.date+'</div></div><button class="mx" onclick="openUpd()">← 목록</button></div>'+inner;}
document.getElementById('updBtn').onclick=openUpd;
buildRail();buildChans();render();
</script>
