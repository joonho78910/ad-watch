body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;background:#fff;color:#15181e;}
.app{display:flex;height:100vh;overflow:hidden;}
.rail{width:78px;flex-shrink:0;background:#15161d;display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:6px;}
.rail .r{width:58px;border-radius:12px;background:#23252f;color:#c4c7d0;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;cursor:pointer;font-size:10px;font-weight:700;text-align:center;transition:.15s;}
.rail .r .ic{font-size:20px;}
.rail .r:hover{background:#3a3d4d;}.rail .r.on{background:#4f6df5;color:#fff;}
.chans{width:248px;flex-shrink:0;background:#1b1d27;color:#c4c7d0;display:flex;flex-direction:column;}
.chans .hd{padding:14px 16px;border-bottom:1px solid #2a2c39;}
.chans .hd .nm{font-size:16px;font-weight:800;color:#fff;}
.chans .hd .sub{font-size:11px;color:#8a8f9e;margin-top:2px;}
.chans .hd select{width:100%;margin-top:9px;background:#0e0f15;color:#e6e8ee;border:1px solid #2a2c39;border-radius:7px;padding:6px 8px;font-size:12px;}
.chans .scroll{flex:1;overflow-y:auto;padding:8px 0 16px;}
.allch{margin:4px 8px;padding:8px 10px;border-radius:7px;font-size:13.5px;font-weight:700;color:#e6e8ee;background:#23252f;cursor:pointer;}
.allch.on{background:#4f6df5;}
.ch{display:flex;align-items:center;gap:9px;margin:1px 8px;padding:6px 8px;border-radius:7px;font-size:13.5px;color:#b6bac6;cursor:pointer;}
.ch:hover{background:#23252f;color:#fff;}.ch.on{background:#34384a;color:#fff;}
.ch .ico{width:30px;height:30px;border-radius:7px;background:#2a2c39 center/cover;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#9aa0b0;overflow:hidden;}
.ch .ico img{width:100%;height:100%;object-fit:cover;}
.ch .nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ch .cnt{font-size:10px;background:#2a2c39;color:#9aa0b0;border-radius:9px;padding:1px 6px;}.ch.on .cnt{background:#4f6df5;color:#fff;}
.main{flex:1;min-width:0;background:#f5f6f8;overflow-y:auto;}
.mh{background:#fff;border-bottom:1px solid #e5e7eb;padding:14px 24px;position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:14px;}
.mh .bico{width:46px;height:46px;border-radius:11px;background:#eef0f3 center/cover;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-weight:800;color:#9ca3af;}
.mh .bico img{width:100%;height:100%;object-fit:cover;}
.mh h1{font-size:18px;font-weight:800;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.mh .tag{font-size:11px;font-weight:700;color:#fff;padding:2px 8px;border-radius:999px;}
.mh .meta{font-size:12px;color:#6b7280;margin-top:2px;}
.body{padding:18px 24px 50px;}
.note{background:#eef2ff;border:1px solid #dbe3ff;color:#3a4a8c;font-size:12px;padding:9px 13px;border-radius:8px;margin-bottom:16px;}
.sec h2{font-size:14px;font-weight:800;margin:18px 0 11px;display:flex;align-items:center;gap:7px;}
.sec h2 .t{font-size:11px;font-weight:700;color:#fff;padding:2px 8px;border-radius:999px;}
.feed{display:grid;grid-template-columns:repeat(auto-fill,minmax(218px,1fr));gap:13px;}
.it{background:#fff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;cursor:pointer;transition:.15s;display:flex;flex-direction:column;}
.it:hover{box-shadow:0 6px 18px rgba(28,35,66,.13);transform:translateY(-2px);}
.th{position:relative;aspect-ratio:16/10;background:#0c0d12 center/cover no-repeat;}
.th.vert{aspect-ratio:auto;height:150px;}
.th .pl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:34px;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.7);opacity:.92;}
.th:hover .pl{transform:scale(1.15);}
.th .src{position:absolute;top:7px;left:7px;font-size:9px;font-weight:800;padding:2px 7px;border-radius:5px;color:#fff;}
.th .kd{position:absolute;top:7px;right:7px;font-size:9px;font-weight:800;padding:2px 7px;border-radius:5px;color:#fff;background:rgba(0,0,0,.6);}
.th .imp{position:absolute;bottom:7px;right:7px;background:rgba(79,109,245,.95);color:#fff;font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px;}
.th .new{position:absolute;bottom:7px;left:7px;background:#e0518a;color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:5px;}
.ib{padding:9px 11px;}
.itt{font-size:12.5px;font-weight:600;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.im{font-size:11px;color:#9ca3af;margin-top:4px;}
.empty{color:#9ca3af;font-size:13px;padding:24px 0;}
.modal{display:none;position:fixed;inset:0;background:rgba(10,11,16,.85);z-index:100;align-items:center;justify-content:center;padding:24px;}
.mdbox{background:#fff;border-radius:12px;padding:14px;max-width:520px;width:100%;max-height:92vh;overflow:auto;}
.mdh{display:flex;justify-content:space-between;gap:10px;margin-bottom:10px;}
.mdt{font-size:14px;font-weight:700;}.mdm{font-size:11px;color:#6b7280;}
.mx{border:0;background:#eef0f3;width:28px;height:28px;border-radius:8px;cursor:pointer;flex-shrink:0;}
.modal img,.modal video{display:block;margin:0 auto;max-width:100%;max-height:66vh;border-radius:8px;}
.mnote{margin-top:9px;background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;font-size:12px;padding:8px 11px;border-radius:8px;}
.updbtn{width:100%;margin-top:8px;background:#e0518a;color:#fff;border:0;border-radius:7px;padding:7px 8px;font-size:12px;font-weight:800;cursor:pointer;}
.updbtn:hover{background:#cf4079;}
.updd{margin:14px 0 7px;font-weight:800;font-size:13px;border-top:1px solid #eee;padding-top:11px;}
.updd span{color:#9ca3af;font-weight:600;font-size:11px;}
.updg{display:grid;grid-template-columns:repeat(auto-fill,minmax(82px,1fr));gap:7px;}
.updc{cursor:pointer;}
.updt{aspect-ratio:1;border-radius:7px;background:#0c0d12 center/cover no-repeat;position:relative;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;text-shadow:0 1px 6px rgba(0,0,0,.7);}

for(let i=ITEMS.length-1;i>=0;i--)if(ITEMS[i].kind==='frame')ITEMS.splice(i,1);
const TODAY=new Date('2026-06-26');
ITEMS.forEach(x=>x.days=Math.round((TODAY-new Date(x.date))/864e5));
const KIND={yt:{lb:"▶ 유튜브",bg:"#ff0000"},vid:{lb:"▶ 영상",bg:"#2b6fff"},frame:{lb:"🖼 프레임",bg:"#6b7280"},img:{lb:"📷 이미지",bg:"#1a7f43"}};
let GENRE="서브컬처",GAME=null,CTRY="";
function buildRail(){const r=document.getElementById('rail');r.innerHTML=Object.keys(GEN).map(g=>`<div class="r ${g===GENRE?'on':''}" data-g="${g}"><span class="ic">${GEN[g].ic}</span>${g}</div>`).join('');r.onclick=e=>{const d=e.target.closest('.r');if(!d)return;GENRE=d.dataset.g;GAME=null;[...r.children].forEach(x=>x.classList.toggle('on',x.dataset.g===GENRE));buildChans();render();};}
function inGenre(){return ITEMS.filter(x=>{if(x.gen!==GENRE)return false;if(!CTRY)return true;if(CTRY==='글로벌(유튜브)')return x.src==='YT';return x.src==='YT'||x.ctry===CTRY;});}
function buildChans(){document.getElementById('gnm').textContent=GENRE+" 워치";document.getElementById('gsub').textContent="자사: "+GEN[GENRE].self;
 const d=inGenre();const games=[...new Set(d.map(x=>x.game))].map(g=>({g,n:d.filter(x=>x.game===g).length}));
 let h=`<div class="allch ${!GAME?'on':''}" data-all="1">📋 전체 (${d.length})</div>`;
 h+=games.map(x=>`<div class="ch ${GAME===x.g?'on':''}" data-g="${x.g.replace(/"/g,'&quot;')}"><span class="ico">${ICON[x.g]?`<img src="${ICON[x.g]}" onerror="this.parentNode.textContent='${x.g[0]}'">`:x.g[0]}</span><span class="nm">${x.g}</span><span class="cnt">${x.n}</span></div>`).join('');
 const cl=document.getElementById('chlist');cl.innerHTML=h;
 cl.onclick=e=>{if(e.target.closest('.allch')){GAME=null;buildChans();render();return;}const c=e.target.closest('.ch');if(!c)return;GAME=c.dataset.g;buildChans();render();};}
document.getElementById('ctry').onchange=e=>{CTRY=e.target.value;GAME=null;buildChans();render();};
function it(x){const k=KIND[x.kind],vert=(x.src==='AM');
 return `<div class="it" data-x='${encodeURIComponent(JSON.stringify({k:x.kind,vid:x.vid||'',th:x.th,t:x.title,g:x.game,d:x.date}))}' onclick="openIt(this)">
  <div class="th ${vert?'vert':''}" style="background-image:url('${x.th}')">
   <span class="src" style="background:${x.src==='YT'?(x.off?'#6b7280':'#ff0000'):'#1b1d27'}">${x.src==='YT'?(x.off?'유튜브(플레이)':'공식 유튜브'):'AppMagic'}</span>
   <span class="kd" style="background:${k.bg}">${k.lb}</span>
   ${x.imp?`<span class="imp">${x.imp>=1e8?(x.imp/1e8).toFixed(1)+'억':x.imp>=1e4?Math.round(x.imp/1e4)+'만':x.imp}</span>`:''}
   ${x.days<=3?'<span class="new">NEW</span>':''}
   ${(x.kind==='yt'||x.kind==='vid')?'<span class="pl">▶</span>':''}
  </div><div class="ib"><div class="itt">${x.title}</div><div class="im">${CC[x.ctry]||''} ${x.game} · ${x.date} (${x.days}일 전)</div></div></div>`;}
function openIt(el){const x=JSON.parse(decodeURIComponent(el.dataset.x));const md=document.getElementById('md');let inner='';
 if(x.k==='yt'){window.open('https://www.youtube.com/watch?v='+x.vid,'_blank','noopener');return;}
 if(x.k==='vid'){inner=`<video src="${x.th.replace(/\.frame\.[\d.]+\.jpg$/,'')}" controls autoplay playsinline></video>`;}
 else if(x.k==='frame'){inner=`<img src="${x.th}"><div class="mnote">⚠ 영상 파일 미제공 · 정지 프레임(메타 광고)</div>`;}
 else{inner=`<img src="${x.th}"><div class="mnote">📷 이미지 광고</div>`;}
 md.innerHTML=`<div class="mdh"><div><div class="mdt">${x.g}</div><div class="mdm">${x.t} · ${x.d}</div></div><button class="mx" onclick="closeM()">✕</button></div>${inner}`;
 document.getElementById('modal').style.display='flex';}
function closeM(){document.getElementById('modal').style.display='none';document.getElementById('md').innerHTML='';}
function render(){const d=inGenre();let rows,bico,title;
 if(GAME){rows=d.filter(x=>x.game===GAME);title=GAME;bico=ICON[GAME];}
 else{rows=d;title=GENRE+" 전체";bico=null;}
 const yc=rows.filter(x=>x.src==='YT').length,ac=rows.filter(x=>x.src==='AM').length;
 document.getElementById('mh').innerHTML=`<div class="bico">${bico?`<img src="${bico}">`:GEN[GENRE].ic}</div><div><h1>${title} <span class="tag" style="background:${GEN[GENRE].c}">${GENRE}</span></h1><div class="meta">공식 유튜브 ${yc} · AppMagic 광고 ${ac} · ${new Set(rows.map(x=>x.game)).size}개 게임</div></div>`;
 const cont=document.getElementById('content');
 if(!rows.length){cont.innerHTML='<div class="empty">해당 조건 소재가 없습니다. 국가/장르를 바꿔보세요.</div>';return;}
 const ytR=rows.filter(x=>x.src==='YT').sort((a,b)=>b.date.localeCompare(a.date));
 const amR=rows.filter(x=>x.src==='AM').sort((a,b)=>(b.imp||0)-(a.imp||0));
 let h='';
 if(ytR.length)h+=`<div class="sec"><h2>📺 공식 유튜브 <span class="t" style="background:#ff0000">최신순</span></h2><div class="feed">${ytR.map(it).join('')}</div></div>`;
 if(amR.length)h+=`<div class="sec"><h2>📣 실제 집행 광고 (AppMagic) <span class="t" style="background:#4f6df5">노출수순</span></h2><div class="feed">${amR.map(it).join('')}</div></div>`;
 cont.innerHTML=h;}
let _log=[];
function openUpd(){const by={};ITEMS.forEach(x=>{(by[x.added]=by[x.added]||[]).push(x);});
 const dates=Object.keys(by).sort().reverse();_log=[];
 let h=`<div class="mdh"><div><div class="mdt">🆕 업데이트 내역</div><div class="mdm">매일 새로 추가된 소재가 날짜별로 쌓입니다 · 최종 갱신 ${dates[0]||'-'}</div></div><button class="mx" onclick="closeM()">✕</button></div>`;
 dates.forEach(d=>{const items=by[d];const yc=items.filter(x=>x.src==='YT').length;
  h+=`<div class="updd">📅 ${d} <span>(${items.length}건 · 유튜브 ${yc} / 광고 ${items.length-yc})</span></div><div class="updg">`;
  h+=items.map(x=>{const i=_log.push(x)-1;return `<div class="updc" onclick="playLog(${i})" title="${x.game} — ${x.title}"><div class="updt" style="background-image:url('${x.th}')">${(x.kind==='yt'||x.kind==='vid')?'▶':'📷'}</div><div class="updn">${x.game}</div></div>`;}).join('');
  h+=`</div>`;});
 document.getElementById('md').innerHTML=h;document.getElementById('modal').style.display='flex';}
function playLog(i){const x=_log[i];if(x.kind==='yt'){window.open('https://www.youtube.com/watch?v='+x.vid,'_blank','noopener');return;}
 let inner=x.kind==='vid'?`<video src="${x.th.replace(/\.frame\.[\d.]+\.jpg$/,'')}" controls autoplay playsinline></video>`:`<img src="${x.th}"><div class="mnote">📷 이미지 광고</div>`;
 document.getElementById('md').innerHTML=`<div class="mdh"><div><div class="mdt">${x.game}</div><div class="mdm">${x.title} · ${x.date}</div></div><button class="mx" onclick="openUpd()">← 목록</button></div>${inner}`;}
document.getElementById('updBtn').onclick=openUpd;
buildRail();buildChans();render();
</script>
</body>
</html>
